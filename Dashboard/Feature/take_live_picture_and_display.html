<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selected Device Control</title>
  <script>
    let Ntfy_Token = getCookie("ntfy_subcribe_token");
    let selected_device = getCookie("selected_device");
    let displayedMessages = []; // List to store displayed messages

    // Function to get a cookie by name
    function getCookie(name) {
      let nameEQ = name + "=";
      let cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        let cookie = cookies[i].trim();
        if (cookie.indexOf(nameEQ) == 0) {
          return cookie.substring(nameEQ.length, cookie.length);
        }
      }
      return null;
    }

    function send_alert_to_selected_device(selectedDevice, Ntfy_Token, command_intent_trigger_code) {
      if (selectedDevice && Ntfy_Token) {
        let fullUrl = `https://trigger.macrodroid.com/${selectedDevice}/_init_?NtfyCallerTopic_ForOnlineDevice=${Ntfy_Token}&Command_Init=${command_intent_trigger_code}`;

        fetch(fullUrl)
          .then(response => response.ok ? response.json() : console.error(`Failed to fetch from ${fullUrl}`))
          .then(data => console.log(`Response from ${fullUrl}:`, data))
          .catch(error => console.error(`Error fetching ${fullUrl}:`, error));
      } else {
        console.error('Selected device or Ntfy token not found.');
      }
    }

    function GetRecentMessageFromNtfy(selectedDevice, Ntfy_Token, command_intent_trigger_code, filterKeyword) {
      function isMessageWithinLastMinutes(messageTime, minutes) {
        const currentTime = new Date();
        const messageDate = new Date(messageTime * 1000); // Convert to milliseconds
        const timeDiffInMs = currentTime - messageDate;
        return Math.floor(timeDiffInMs / (1000 * 60)) <= minutes;
      }

      function get_ntfy_messages(topic, minutes, filterKeyword = "") {
        const apiUrl = `https://ntfy.sh/${topic}/json?poll=1&sched=1`;
        console.log("Fetching from API:", apiUrl); // Log API URL for debugging

        return fetch(apiUrl)
          .then(response => response.text())
          .then(data => {
            const messages = [];
            const lines = data.trim().split("\n");

            lines.forEach(line => {
              try {
                const jsonData = JSON.parse(line);
                if (isMessageWithinLastMinutes(jsonData.time, minutes)) {
                  if (filterKeyword && jsonData.message.includes(filterKeyword)) {
                    messages.push(jsonData);
                  }
                }
              } catch (error) {
                console.error("Error parsing line:", line, error);
              }
            });

            return messages;
          })
          .catch(error => {
            console.error("Error fetching data:", error);
          });
      }

      if (selectedDevice && Ntfy_Token) {
        // send_alert_to_selected_device(selectedDevice, Ntfy_Token, command_intent_trigger_code);

        return get_ntfy_messages(Ntfy_Token, 2, filterKeyword)
          .then(messages => {
            const recentMessage = messages.reduce((latest, message) =>
              !latest || message.time > latest.time ? message : latest, null);

            if (recentMessage) {
              return recentMessage;
            } else {
              console.log("No messages found.");
              return null;
            }
          })
          .catch(error => {
            console.error('Error fetching Ntfy messages:', error);
            return null;
          });
      } else {
        console.error('Selected device or Ntfy token not found.');
        return null;
      }
    }

    function Display(message) {
      const deviceStatusList = document.getElementById("device-status");

      // Split the message by "|!|"
      const parts = message.split("|!|");

      // Extract user ID and image link
      if (parts.length >= 4) {
        const userId = parts[2];
        let imageUrl = parts[3];
        console.log(imageUrl);

        // Ensure correct format for image URL by adding 'https://' if missing
        if (!imageUrl.startsWith("https://")) {
          imageUrl = `https://${imageUrl}`;
        }

        // Display the image
        const imgElement = document.createElement("img");
        imgElement.src = imageUrl;
        imgElement.alt = `Image from device ${userId}`;
        imgElement.style.width = "300px"; // Set image size
        imgElement.style.height = "auto";

        const listItem = document.createElement("li");
        listItem.appendChild(imgElement);
        deviceStatusList.appendChild(listItem); // Append the new image to the list
      } else {
        console.error("Message format is invalid or incomplete:", message);
      }
    }

    function triggerCamera(command, filterKeyword) {
      // Show a confirmation message to the user
      const confirmationMessage = document.getElementById("confirmation-message");
      confirmationMessage.textContent = "Picture is being taken...";
      send_alert_to_selected_device(selected_device, Ntfy_Token, command);

      let intervalId = setInterval(function () {
        GetRecentMessageFromNtfy(
          selected_device,
          Ntfy_Token,
          command,
          filterKeyword
        )
          .then(recentMessage => {
            if (recentMessage) {
              const data = recentMessage.message; // Display the first message

              // Check if the message has already been displayed
              if (!displayedMessages.includes(data)) {
                Display(data); // Display new message

                // Add the message to the list of displayed messages
                displayedMessages.push(data);

                // Clear confirmation message after displaying the image
                confirmationMessage.textContent = "";

                // Stop checking once a message is received
                clearInterval(intervalId);
              } else {
                console.log("Duplicate message found. Skipping display.");
              }
            } else {
              console.log("No recent messages found.");
            }
          })
          .catch(error => {
            console.error("Error fetching messages:", error);
            alert("An error occurred. Please reload the page.");
            location.reload(); // Reload the page on error
          });
      }, 5000); // Check every 5 seconds
    }

    window.onload = function () {
      // Bind buttons to camera triggers
      document.getElementById("front-camera-btn").onclick = function () {
        triggerCamera("click_and_send_front_camera_picture_to_the_server", "take_live_camera_pic_true");
      };

      document.getElementById("rear-camera-btn").onclick = function () {
        triggerCamera("click_and_send_rear_camera_picture_to_the_server", "take_live_camera_pic_true");
      };
    };
  </script>
</head>

<body>
  <h1>Selected Device Status/Condition</h1>
  <ul id="device-status"></ul>

  <!-- Section to display confirmation message -->
  <p id="confirmation-message" style="color: blue; font-weight: bold;"></p>

  <button id="front-camera-btn">Take Front Camera Picture</button>
  <button id="rear-camera-btn">Take Rear Camera Picture</button>
</body>

</html>
